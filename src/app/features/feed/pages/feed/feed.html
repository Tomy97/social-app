<main class="min-h-screen">
  <app-navbar-component [currentUser]="currentUser" (logout)="onLogout()" />

  <div class="mx-auto w-full max-w-[960px] gap-4 px-4 py-4">
    <section class="space-y-4">
      <app-create-post-composer-component [currentUser]="currentUser" (createPost)="onCreatePost($event)" />

      @for (post of posts; track post.id) {
        <app-post-card-component
          [post]="post"
          [currentUser]="currentUser"
          (likeToggled)="onToggleLike($event)"
          (repostedToggled)="repostedToggled($event)"
          (saveToggled)="onToggleSave($event)"
          (commentAdded)="onAddComment($event)"
        />
      } @empty {
        <div class="flex items-center justify-center">
          <h3>No hay posts para mostrar</h3>
        </div>
      }
    </section>
  </div>
</main>
