<main class="min-h-screen">
  <app-feed-header-component [currentUser]="currentUser" />

  <div class="mx-auto grid w-full max-w-[1280px] grid-cols-12 gap-4 px-4 py-4">
    <div class="col-span-12 lg:col-span-2"></div>
    <section class="col-span-12 lg:col-span-7 space-y-4">
      <app-create-post-composer-component [currentUser]="currentUser" />

      @for (post of posts; track post.id) {
        <app-post-card-component [post]="post" />
      } @empty {
        <div class="flex items-center justify-center">
          <h3>No hay posts para mostrar</h3>
        </div>
      }
    </section>

    <aside class="col-span-12 lg:col-span-3">
      <app-suggestions-card-component [users]="users" />
    </aside>
  </div>
</main>
