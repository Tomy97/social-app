<article
  class="mb-4 flex items-center justify-between rounded-2xl border border-border bg-card p-4 shadow-card transition-base hover:border-primary/40 hover:shadow-[0_0_0_1px_rgba(124,58,237,0.30),0_12px_28px_-16px_rgba(124,58,237,0.80)]"
  (click)="openModal()"
>
  <div class="flex flex-row items-center gap-3">
    <img [src]="currentUser.avatarUrl" alt="Avatar" class="h-10 w-10 rounded-full bg-primary/20" />
    <span class="flex-1 text-left text-sm text-muted-foreground">¿Qué estás pensando?</span>
  </div>
  <p
    class="hidden sm:inline-flex items-center gap-1 rounded-lg bg-primary/20 px-3 py-2 text-xs font-medium text-primary"
  >
    Publicar
  </p>
</article>

<button
  type="button"
  class="fixed bottom-6 right-6 z-40 flex h-14 w-14 items-center justify-center rounded-full bg-primary text-primary-foreground shadow-elevated transition-base hover:brightness-110 sm:hidden"
  (click)="openModal()"
  aria-label="Crear publicación"
>
  @if (plus) {
    <lucide-icon [img]="plus" size="22" />
  }
</button>

@if (isModalOpen) {
  <app-create-post-modal-component
    [currentUser]="currentUser"
    (closed)="closeModal()"
    (published)="onModalPublish($event)"
  />
}
