<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/65 p-4"
  (click)="closeModal()"
>
  <div
    class="w-full max-w-xl rounded-2xl border border-border bg-card p-6 shadow-elevated"
    (click)="$event.stopPropagation()"
  >
    <div class="mb-4 flex items-center justify-between">
      <h3 class="text-lg font-bold text-foreground">Crear una publicación</h3>
      <app-close-button-component (click)="closeModal()" />
    </div>

    <div class="mb-4 flex items-start gap-3">
      <div class="h-10 w-10 shrink-0 overflow-hidden rounded-full bg-primary/20">
        <img
          [src]="currentUser.avatarUrl"
          alt="Avatar"
          class="h-full w-full rounded-full object-cover"
        />
      </div>
      <textarea
        [value]="content"
        (input)="onContentChange($event)"
        [attr.maxlength]="maxCharacters"
        placeholder="¿Qué estás pensando?"
        class="min-h-36 w-full resize-none rounded-xl border border-primary bg-input p-4 text-lg text-foreground outline-none transition-base placeholder:text-muted-foreground/80 focus:border-primary-glow focus:ring-1 focus:ring-primary/70"
      ></textarea>
    </div>

    <div
      class="mb-4 flex min-h-28 items-center justify-center rounded-xl border border-dashed border-border bg-secondary/30 text-muted-foreground transition-base"
      [class.border-primary]="isDragOver"
      [class.bg-primary/10]="isDragOver"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <input
        #imageFileInput
        type="file"
        accept="image/*"
        class="hidden"
        (change)="onSelectImage($event)"
      />
      @if (imagePreviewUrl) {
        <div class="relative w-full p-3">
          <img
            [src]="imagePreviewUrl"
            alt="Selected image preview"
            class="h-36 w-full rounded-lg object-cover"
          />
          <app-image-overlay-button-component (click)="removeImage()">Quitar</app-image-overlay-button-component>
        </div>
      } @else {
        <div class="text-center">
          @if (image) {
            <lucide-icon [img]="image" size="22" class="mx-auto mb-2" />
          }
          <p>
            Arrastra y suelta una imagen, o
            <app-button-component variant="link" (click)="imageFileInput.click()">explorar</app-button-component>
          </p>
        </div>
      }
    </div>

    <div class="mb-5 text-sm text-muted-foreground">
      {{ remainingCharacters }} caracteres restantes
    </div>

    <div class="flex items-center justify-end gap-3">
      <app-button-component variant="secondary" size="modal" (click)="closeModal()">Cancelar</app-button-component>
      <app-button-component variant="primary" size="modal" [disabled]="!canPublish" (click)="onPublish()">Publicar</app-button-component>
    </div>
  </div>
</div>
