<div class="space-y-2">
  <label [for]="id" class="block text-sm font-medium text-foreground">{{ label }}</label>
  <div class="relative">
    <app-input-component
      [id]="id"
      [type]="showPassword ? 'text' : 'password'"
      [placeholder]="placeholder"
      [value]="value"
      [invalid]="invalid"
      [extraClass]="['pr-10']"
      (valueChange)="valueChange.emit($event)"
    />
    <button
      type="button"
      class="absolute inset-y-0 right-3 text-muted-foreground hover:text-foreground transition-base"
      (click)="togglePasswordVisibility()"
      [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
    >
      @if (!showPassword) {
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3l18 18" />
          <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
          <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a17.2 17.2 0 0 1-3.17 4.36" />
          <path d="M6.61 6.61C4.03 8 2 12 2 12s3.5 7 10 7a10.9 10.9 0 0 0 4.13-.78" />
        </svg>
      }
    </button>
  </div>
  @if (invalid && errorMessage) {
    <p class="text-sm text-destructive">{{ errorMessage }}</p>
  }
</div>
