<div [ngClass]="['flex items-center gap-3', ...containerClass]">
  <div [ngClass]="[avatarSizeClass]" class="rounded-full bg-primary/25">
    <img [src]="avatarUrl" alt="Avatar" class="h-full w-full rounded-full" />
  </div>
  <div>
    <p class="text-sm font-semibold text-foreground">{{ name }}</p>
    <p class="text-xs text-muted-foreground">{{ subtitle }}</p>
  </div>
</div>
