<article class="overflow-hidden rounded-2xl border border-border bg-card shadow-card mb-4">
  <div class="p-4">
    <div class="mb-3 flex items-start justify-between">
      <app-profile-summary-component
        [avatarUrl]="post.author.avatarUrl"
        [name]="post.author.name"
        [subtitle]="postSubtitle"
      />
      <button class="text-muted-foreground">
        <lucide-icon [img]="ellipsis" size="15" />
      </button>
    </div>
    <p class="text-sm leading-relaxed text-foreground/90">
      {{ post.content }}
    </p>
  </div>
  @if (post.imageUrl) {
    <div class="w-full bg-secondary/50">
      <img
        [src]="post.imageUrl"
        alt="Imagen de la publicación"
        class="max-h-[620px] w-full object-contain"
      />
    </div>
  }

  <div
    class="flex items-center justify-between gap-6 border-t border-border px-4 py-3 text-sm text-muted-foreground"
  >
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="flex items-center h-9 rounded-md px-3 gap-2 hover:text-like hover:bg-like/10 transition-base focus:outline-none"
        [class]="post.liked ? 'text-like' : ''"
        (click)="onToggleLike()"
      >
        <lucide-icon
          [img]="heart"
          size="15"
          [iconFill]="post.liked ? 'var(--color-like)' : 'none'"
        />
        {{ post.likes }}
      </button>
      <button
        type="button"
        class="flex items-center h-9 rounded-md px-3 gap-2 text-muted-foreground transition-base sm:hover:text-primary sm:hover:bg-primary/10"
        [class]="isCommentsOpen ? 'border border-primary text-primary bg-primary/10' : ''"
        (click)="onToggleComments()"
      >
        <lucide-icon [img]="messageCircle" size="15" />
        {{ post.comments.length }}
      </button>
      <button
        type="button"
        class="flex items-center h-9 rounded-md px-3 gap-2 text-muted-foreground transition-base sm:hover:text-reposted sm:hover:bg-reposted/10"
        [class]="post.reposted ? 'text-reposted' : ''"
        (click)="onToggleReposted()"
      >
        <lucide-icon
          [img]="repeat2"
          size="15"
        />
        {{ post.reposts ?? 0 }}
      </button>
    </div>
    <button
      type="button"
      class="h-9 rounded-full px-3 text-muted-foreground transition-base focus:outline-none sm:hover:text-primary sm:hover:bg-primary/10"
      (click)="onToggleSave()"
    >
      <lucide-icon
        [img]="bookmark"
        size="15"
        [class]="post.saved ? 'text-primary' : ''"
        iconFill="{{ post.saved ? 'var(--color-primary)' : 'none' }}"
      />
    </button>
  </div>

  @if (isCommentsOpen) {
    <div class="border-t border-border px-4 py-4">
      @if (post.comments.length === 0) {
        <p class="pb-4 text-center text-muted-foreground">Sé el primero en comentar.</p>
      } @else {
        <div class="mb-4 space-y-3">
          @for (comment of post.comments; track comment.id) {
            <div class="flex items-start gap-3">
              <img
                [src]="comment.author.avatarUrl"
                [alt]="comment.author.name"
                class="h-8 w-8 rounded-full"
              />
              <div class="w-full rounded-xl bg-secondary/70 px-3 py-2">
                <div class="text-sm font-semibold text-foreground">{{ comment.author.name }}</div>
                <p class="text-sm text-foreground/90">{{ comment.content }}</p>
              </div>
            </div>
          }
        </div>
      }

      <div class="flex items-center gap-3">
        <img
          [src]="currentUser.avatarUrl"
          alt="Avatar"
          class="h-8 w-8 rounded-full bg-primary/20"
        />
        <input
          type="text"
          [value]="commentContent"
          (input)="onCommentInput($event)"
          placeholder="Escribe un comentario..."
          class="h-10 flex-1 rounded-xl border border-border bg-secondary px-3 text-sm text-foreground placeholder:text-muted-foreground outline-none transition-base focus:border-primary focus:ring-1 focus:ring-primary/40"
        />
        <button
          type="button"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-primary text-primary-foreground transition-base hover:brightness-110 disabled:pointer-events-none disabled:opacity-60"
          [disabled]="!commentContent.trim()"
          (click)="onAddComment()"
        >
          <lucide-icon [img]="send" size="16" />
        </button>
      </div>
    </div>
  }
</article>
