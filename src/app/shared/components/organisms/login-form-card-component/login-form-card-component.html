<div class="bg-card border border-border rounded-2xl shadow-card p-6 sm:p-8">
  <app-logo-component size="md" [extraClass]="['mb-5 flex items-center justify-center gap-2']" />
  <form class="mt-6 space-y-4">
    <app-form-input-component id="email" label="Email" type="email" placeholder="you@example.com" />
    <app-password-input-component id="password" label="Password" placeholder="••••••••" />

    <app-button-component variant="primary" size="full" type="submit" [extraClass]="['my-6']">Log in</app-button-component>
  </form>

  <div class="my-5 flex items-center gap-3 text-xs text-muted-foreground">
    <div class="flex-1 h-px bg-border"></div>
    or continue with
    <div class="flex-1 h-px bg-border"></div>
  </div>

  <app-button-component
    variant="ghost"
    size="full"
    type="button"
  >
    <app-google-icon />
    Log in with Google
  </app-button-component>
</div>
