<header class="sticky top-0 z-30 border-b border-border bg-background/80 backdrop-blur-xl">
  <div class="mx-auto flex h-16 w-full max-w-[1280px] items-center justify-between gap-4 px-4">
    <app-logo-component size="md" [extraClass]="['mx-auto max-w-7xl px-4 h-16 flex items-center gap-4']" />

    <app-search-input-component />

    <div class="flex items-center gap-2">
      <button
        class="hidden md:flex h-9 rounded-md px-3 items-center gap-1 bg-primary text-xs font-semibold text-primary-foreground transition-base hover:brightness-110"
      >
        <lucide-icon [img]="plus" size="14" />
        New Post
      </button>
      <button
        type="button"
        class="h-9 w-9 rounded-full bg-primary/25 text-primary flex items-center justify-center transition-base hover:bg-primary/35"
      >
        <img [src]="currentUser.avatarUrl" alt="Avatar" class="h-full w-full rounded-full" />
      </button>
      <button
        type="button"
        class="h-9 w-9 rounded-full border border-none bg-background/80 text-muted-foreground flex items-center justify-center transition-base hover:text-foreground"
      >
        <lucide-icon [img]="logOut" size="15" />
      </button>
    </div>
  </div>
</header>
