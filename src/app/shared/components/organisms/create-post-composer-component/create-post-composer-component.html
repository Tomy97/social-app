<article class="rounded-2xl border border-border bg-card p-4 shadow-card">
  <div class="flex items-center gap-3">
    <div class="h-10 w-10 rounded-full bg-primary/20">
      <img [src]="currentUser.avatarUrl" alt="Avatar" class="h-full w-full rounded-full" />
    </div>
    <app-input-component type="text" variant="composer" placeholder="What's on your mind?" />
    <button class="inline-flex items-center gap-1 rounded-lg bg-primary/20 px-3 py-2 text-xs font-medium text-primary">
      <lucide-icon [img]="image" size="14" />
      Post
    </button>
  </div>
</article>
